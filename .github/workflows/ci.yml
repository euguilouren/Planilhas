name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Testes unitários e de integração ─────────────────────────────
  test:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar testes
        run: |
          pytest tests/ -v \
            --cov=toolkit_financeiro \
            --cov=relatorio_html \
            --cov=motor_automatico \
            --cov=dashboard_visual \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --tb=short

  # ── Lint: ruff + black ────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ferramentas de lint
        run: pip install ruff black

      - name: ruff check
        run: ruff check . --output-format=github

      - name: black check
        run: black --check --diff .

  # ── SAST: bandit (análise estática de segurança Python) ──────────
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar bandit
        run: pip install bandit[toml]

      - name: Executar bandit (falha em HIGH/MEDIUM)
        run: |
          bandit -r . \
            --exclude ./.git,./tests,./build,./dist \
            -ll \
            -f txt

  # ── Auditoria de dependências (bloqueante) ────────────────────────
  security-audit:
    name: Auditoria de segurança de dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Executar pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=markdown

  # ── Validação do index.html ───────────────────────────────────────
  validate-html:
    name: Validar index.html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar branding e estrutura HTML
        run: |
          python -c "
          with open('index.html', encoding='utf-8') as f:
              content = f.read()
          assert '<!DOCTYPE html>' in content, 'DOCTYPE ausente'
          assert 'Luan Guilherme' in content, 'Branding ausente no index.html'
          assert 'Toolkit Financeiro' in content, 'Título ausente'
          print('index.html: OK')
          "

  # ── Validação do config.yaml ──────────────────────────────────────
  validate-config:
    name: Validar config.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install PyYAML

      - name: Verificar estrutura do config.yaml
        run: |
          python -c "
          import yaml
          with open('config.yaml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          secoes = ('pastas', 'colunas', 'auditoria', 'indicadores', 'aging', 'email', 'relatorio')
          for s in secoes:
              assert s in cfg, f'Seção ausente no config.yaml: {s}'
          print('config.yaml: OK')
          "
