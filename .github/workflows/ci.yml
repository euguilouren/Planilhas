name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes Python
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar testes
        run: |
          pytest tests/ -v \
            --cov=toolkit_financeiro \
            --cov=relatorio_html \
            --cov=motor_automatico \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --tb=short

  lint:
    name: Lint e análise estática
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ferramentas de lint
        run: pip install ruff

      - name: Ruff (lint + format check)
        # E701/E702: compact inline statements (intentional style in this codebase)
        # B023: loop variable in lambda (false positives — lambdas applied immediately)
        # B905: zip() strict= (Python 3.10+ only concern, not a bug here)
        run: ruff check . --select=E,F,W,B --ignore=E501,E402,E701,E702,B023,B905 --exclude=tests/

  validate-html:
    name: Validar index.html
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verificar branding e estrutura HTML
        run: |
          python -c "
          import os
          verificados = 0
          for fname in ('index.html',):
              if not os.path.exists(fname):
                  continue
              with open(fname, encoding='utf-8') as f:
                  content = f.read()
              assert '<!DOCTYPE html>' in content, f'DOCTYPE ausente em {fname}'
              assert 'Luan Guilherme' in content, f'Branding ausente em {fname}'
              assert 'FluxoPRO' in content, f'Título ausente em {fname}'
              print(f'{fname}: OK')
              verificados += 1
          assert verificados >= 1, 'Nenhum index.html encontrado'
          "

  security-audit:
    name: Auditoria de segurança de dependências
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Executar pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=markdown --strict

  validate-deploy-script:
    name: Validar pipeline de obfuscação
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar javascript-obfuscator
        run: npm install -g javascript-obfuscator@4

      - name: Executar obfuscador (smoke test)
        run: |
          python3 scripts/obfuscar_html.py index.html /tmp/dist_test.html
          python3 -c "
          with open('/tmp/dist_test.html', encoding='utf-8') as f:
              c = f.read()
          assert 'FluxoPRO' in c, 'Título ausente no dist'
          assert 'Luan Guilherme' in c, 'Branding ausente no dist'
          assert len(c) > 50000, 'Arquivo dist muito pequeno — obfuscação falhou'
          print('obfuscar_html.py: OK —', len(c), 'chars')
          "

  sast:
    name: SAST — Bandit (segurança Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Bandit
        run: pip install bandit

      - name: Executar Bandit (severity médio+)
        run: |
          bandit -r . \
            --exclude=./tests \
            -ll \
            --format=txt

  sri-verify:
    name: Verificar integridade dos CDNs (SRI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Baixar e verificar SHA-384 dos CDNs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, hashlib, base64, sys

          cdns = [
              (
                  "SheetJS 0.20.3",
                  "https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js",
                  200_000,   # tamanho mínimo esperado em bytes
              ),
              (
                  "Chart.js 4.4.0",
                  "https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js",
                  100_000,
              ),
          ]

          falhas = []
          for nome, url, min_bytes in cdns:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = r.read()
              except Exception as e:
                  falhas.append(f"{nome}: falha ao baixar — {e}")
                  continue

              if len(data) < min_bytes:
                  falhas.append(f"{nome}: arquivo suspeito ({len(data)} bytes < {min_bytes} esperados)")
                  continue

              h = base64.b64encode(hashlib.sha384(data).digest()).decode()
              print(f"✅ {nome}: sha384-{h}  ({len(data):,} bytes)")

          if falhas:
              for f in falhas:
                  print(f"❌ {f}", file=sys.stderr)
              sys.exit(1)
          PYEOF

  test-js:
    name: Testes JavaScript (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Instalar dependências JS
        run: npm ci --no-audit

      - name: Rodar testes Vitest
        run: npm run test:js

  validate-config:
    name: Validar config.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install PyYAML

      - name: Verificar estrutura do config.yaml
        run: |
          python -c "
          import yaml
          with open('config.yaml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          secoes = ('pastas', 'colunas', 'auditoria', 'indicadores', 'aging', 'email', 'relatorio')
          for s in secoes:
              assert s in cfg, f'Seção ausente no config.yaml: {s}'
          print('config.yaml: OK')
          "
