name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar testes
        run: |
          pytest tests/ -v \
            --cov=toolkit_financeiro \
            --cov=relatorio_html \
            --cov=motor_automatico \
            --cov-report=term-missing \
            --tb=short

  validate-html:
    name: Validar index.html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar branding e estrutura HTML
        run: |
          python -c "
          import os
          verificados = 0
          for fname in ('index.html',):
              if not os.path.exists(fname):
                  continue
              with open(fname, encoding='utf-8') as f:
                  content = f.read()
              assert '<!DOCTYPE html>' in content, f'DOCTYPE ausente em {fname}'
              assert 'Luan Guilherme' in content, f'Branding ausente em {fname}'
              assert 'Planilha Financeira Pro' in content, f'Título ausente em {fname}'
              print(f'{fname}: OK')
              verificados += 1
          assert verificados >= 1, 'Nenhum index.html encontrado'
          "

  security-audit:
    name: Auditoria de segurança de dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Executar pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=markdown

  validate-deploy-script:
    name: Validar pipeline de obfuscação
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar javascript-obfuscator
        run: npm install -g javascript-obfuscator@4

      - name: Executar obfuscador (smoke test)
        run: |
          python3 scripts/obfuscar_html.py index.html /tmp/dist_test.html
          python3 -c "
          with open('/tmp/dist_test.html', encoding='utf-8') as f:
              c = f.read()
          assert 'Planilha Financeira Pro' in c, 'Título ausente no dist'
          assert 'Luan Guilherme' in c, 'Branding ausente no dist'
          assert len(c) > 50000, 'Arquivo dist muito pequeno — obfuscação falhou'
          print('obfuscar_html.py: OK —', len(c), 'chars')
          "

  validate-config:
    name: Validar config.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install PyYAML

      - name: Verificar estrutura do config.yaml
        run: |
          python -c "
          import yaml
          with open('config.yaml', encoding='utf-8') as f:
              cfg = yaml.safe_load(f)
          secoes = ('pastas', 'colunas', 'auditoria', 'indicadores', 'aging', 'email', 'relatorio')
          for s in secoes:
              assert s in cfg, f'Seção ausente no config.yaml: {s}'
          print('config.yaml: OK')
          "
