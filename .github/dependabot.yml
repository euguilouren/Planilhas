version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      production-dependencies:
        patterns:
          - "pandas"
          - "numpy"
          - "openpyxl"
          - "PyYAML"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "black"
          - "bandit"
          - "mypy"
          - "pip-audit"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
