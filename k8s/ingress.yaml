apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: toolkit-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "55m"   # 50MB + overhead
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - toolkit.seudominio.com
      secretName: toolkit-tls
  rules:
    - host: toolkit.seudominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: toolkit-api
                port:
                  number: 80
