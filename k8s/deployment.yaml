apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolkit-api
  labels:
    app: toolkit
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: toolkit
      component: api
  template:
    metadata:
      labels:
        app: toolkit
        component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/euguilouren/planilhas:latest
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: toolkit-secrets
                  key: jwt-secret-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: toolkit-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: toolkit-config
                  key: redis-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolkit-worker
  labels:
    app: toolkit
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: toolkit
      component: worker
  template:
    metadata:
      labels:
        app: toolkit
        component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/euguilouren/planilhas:latest
          command: ["celery", "-A", "worker.tasks", "worker", "--loglevel=info", "--concurrency=2"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: toolkit-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: toolkit-config
                  key: redis-url
            - name: PASTA_JOBS
              value: "/tmp/toolkit_jobs"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
