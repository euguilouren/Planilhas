[tool.ruff]
line-length = 120
select = ["E", "W", "F", "I", "UP", "S", "B", "C4", "PT"]
ignore = [
    "S101",   # assert usado em testes
    "S311",   # random não criptográfico — não usamos para segurança
    "B008",   # default mutable em FastAPI Depends (fase 2)
    "E501",   # comprimento de linha — coberto pelo black
]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S", "B", "PT"]   # flexibilidade em testes

[tool.black]
line-length = 120
target-version = ["py310", "py311", "py312"]
exclude = '''
/(
    \.git
  | __pycache__
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
ignore_missing_imports = true   # dependências externas sem stubs

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[tool.pytest.ini_options]
markers = [
    "slow: testes demorados (rodar com -m slow)",
    "integration: testes de integração end-to-end",
]
testpaths = ["tests"]

[tool.coverage.run]
source = ["toolkit_financeiro", "relatorio_html", "motor_automatico", "dashboard_visual"]
omit = ["tests/*", "rodar.py"]

[tool.coverage.report]
fail_under = 85
show_missing = true
